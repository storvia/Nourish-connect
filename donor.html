<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donor Dashboard | FoodSupport</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<!-- ================= SIDEBAR ================= -->
<aside class="sidebar">
    <div class="sidebar-logo">
        <h2>FoodSupport</h2>
    </div>

    <ul class="sidebar-menu">
        <li><a href="donor.html" class="active">Dashboard</a></li>
        <li><a href="#donateSection">Make Donation</a></li>
        <li><a href="#historySection">Donation History</a></li>
        <li><a href="index.html">Home</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
</aside>

<!-- ================= MAIN CONTENT ================= -->
<main class="main-content">

    <!-- ===== Header ===== -->
    <header class="dashboard-header">
        <h1>Donor Dashboard</h1>
        <div class="user-info">
            <span id="donorName">Welcome, Donor</span>
        </div>
    </header>

    <!-- ===== Summary Cards ===== -->
    <section class="summary-cards">

        <div class="card">
            <h3 id="totalDonated">₦0</h3>
            <p>Total Donated</p>
        </div>

        <div class="card">
            <h3 id="totalTransactions">0</h3>
            <p>Total Donations Made</p>
        </div>

        <div class="card">
            <h3 id="impactFamilies">0</h3>
            <p>Families Supported</p>
        </div>

    </section>

    <!-- ===== Donation Form ===== -->
    <section id="donateSection" class="dashboard-section">
        <h2>Make a Donation</h2>

        <form id="donationForm" class="form-card">
            <div class="form-group">
                <label for="amount">Enter Amount (₦)</label>
                <input type="number" id="amount" required min="100">
            </div>

            <div class="form-group">
                <label for="message">Optional Message</label>
                <textarea id="message" rows="3"></textarea>
            </div>

            <button type="submit" class="btn-primary">
                Donate Now
            </button>
        </form>
    </section>

    <!-- ===== Donation History ===== -->
    <section id="historySection" class="dashboard-section">
        <h2>Your Donation History</h2>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="donationHistory">
                    <!-- Dynamic rows -->
                </tbody>
            </table>
        </div>
    </section>

</main>

<!-- ================= SCRIPTS ================= -->
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/donor.js"></script>

</body>
</html>
